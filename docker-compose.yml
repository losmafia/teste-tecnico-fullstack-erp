version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: erp-postgres
    restart: always
    environment:
      POSTGRES_USER: erp_user
      POSTGRES_PASSWORD: erp_password
      POSTGRES_DB: erp_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: erp-redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    container_name: erp-backend
    ports:
      - "3333:3333"
    environment:
      - PORT=3333
      - DATABASE_URL=postgresql://erp_user:erp_password@db:5432/erp_db?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=super_secret_jwt_key_for_testing
    depends_on:
      - db
      - redis
    command: >
      sh -c "npx prisma migrate dev --name init && npm run dev"

  frontend:
    build:
      context: ./frontend
    container_name: erp-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3333/api
    depends_on:
      - backend

volumes:
  pgdata:
